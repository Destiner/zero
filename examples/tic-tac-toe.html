<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Tic-Tac-Toe (Single Player)</title>
    <style>
      :root {
        --bg: #121212;
        --panel: #1e1e1e;
        --text: #f3f3f3;
        --muted: #bdbdbd;
        --border: #3a3a3a;
        --cell: #252525;
        --cell-hover: #2e2e2e;
        --x: #7aa2ff;
        --o: #ff7a9e;
        --win: #3ddc84;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #1a1a1a, var(--bg));
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Ubuntu,
          Cantarell,
          sans-serif;
        padding: 16px;
      }

      .game-wrap {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        width: min(92vw, 460px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 650;
        letter-spacing: 0.3px;
      }

      .status {
        margin: 0;
        font-size: 0.95rem;
        color: var(--muted);
        text-align: right;
      }

      .status strong {
        color: var(--text);
      }

      .scoreboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin: 12px 0;
      }

      .score {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #191919;
        padding: 8px;
        text-align: center;
      }

      .score .label {
        display: block;
        font-size: 0.75rem;
        opacity: 0.75;
        margin-bottom: 2px;
      }

      .score .value {
        font-size: 1.1rem;
        font-weight: 700;
      }

      .score.you .value {
        color: var(--x);
      }
      .score.ai .value {
        color: var(--o);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 8px;
      }

      .cell {
        aspect-ratio: 1 / 1;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--cell);
        color: var(--text);
        font-size: clamp(2rem, 9vw, 3rem);
        font-weight: 800;
        line-height: 1;
        cursor: pointer;
        transition:
          background 120ms ease,
          transform 80ms ease;
      }

      .cell:hover:enabled {
        background: var(--cell-hover);
      }
      .cell:active:enabled {
        transform: scale(0.98);
      }
      .cell:disabled {
        cursor: default;
      }
      .cell.x {
        color: var(--x);
      }
      .cell.o {
        color: var(--o);
      }
      .cell.win {
        outline: 2px solid var(--win);
        box-shadow: inset 0 0 0 1px rgba(61, 220, 132, 0.35);
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      button.control {
        flex: 1;
        border: 1px solid var(--border);
        background: #202020;
        color: var(--text);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 120ms ease;
      }

      button.control:hover {
        background: #2a2a2a;
      }

      .hint {
        margin: 10px 2px 2px;
        font-size: 0.85rem;
        opacity: 0.8;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="game-wrap">
      <div class="top">
        <h1>Tic-Tac-Toe</h1>
        <p
          class="status"
          id="status"
        >
          Your turn: <strong>X</strong>
        </p>
      </div>

      <div
        class="scoreboard"
        aria-label="Scoreboard"
      >
        <div class="score you">
          <span class="label">You (X)</span>
          <span
            class="value"
            id="scoreYou"
            >0</span
          >
        </div>
        <div class="score">
          <span class="label">Draws</span>
          <span
            class="value"
            id="scoreDraw"
            >0</span
          >
        </div>
        <div class="score ai">
          <span class="label">Computer (O)</span>
          <span
            class="value"
            id="scoreAI"
            >0</span
          >
        </div>
      </div>

      <div
        class="board"
        id="board"
        role="grid"
        aria-label="Tic-Tac-Toe board"
      >
        <button
          class="cell"
          data-index="0"
          aria-label="Cell 1"
        ></button>
        <button
          class="cell"
          data-index="1"
          aria-label="Cell 2"
        ></button>
        <button
          class="cell"
          data-index="2"
          aria-label="Cell 3"
        ></button>
        <button
          class="cell"
          data-index="3"
          aria-label="Cell 4"
        ></button>
        <button
          class="cell"
          data-index="4"
          aria-label="Cell 5"
        ></button>
        <button
          class="cell"
          data-index="5"
          aria-label="Cell 6"
        ></button>
        <button
          class="cell"
          data-index="6"
          aria-label="Cell 7"
        ></button>
        <button
          class="cell"
          data-index="7"
          aria-label="Cell 8"
        ></button>
        <button
          class="cell"
          data-index="8"
          aria-label="Cell 9"
        ></button>
      </div>

      <div class="controls">
        <button
          class="control"
          id="newRound"
        >
          New Round
        </button>
        <button
          class="control"
          id="resetScore"
        >
          Reset Score
        </button>
      </div>

      <div class="hint">
        Single-player only. You are X, computer is O. Press <kbd>R</kbd> for a
        new round.
      </div>
    </div>

    <script>
      const HUMAN = 'X';
      const AI = 'O';
      const THINK_DELAY_MS = 280;

      const cells = [...document.querySelectorAll('.cell')];
      const statusEl = document.getElementById('status');
      const scoreYouEl = document.getElementById('scoreYou');
      const scoreAIEl = document.getElementById('scoreAI');
      const scoreDrawEl = document.getElementById('scoreDraw');
      const newRoundBtn = document.getElementById('newRound');
      const resetScoreBtn = document.getElementById('resetScore');

      const WIN_LINES = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];

      let board = Array(9).fill('');
      let turn = HUMAN;
      let roundOver = false;
      let aiThinking = false;
      let humanStarts = true;
      let score = { human: 0, ai: 0, draw: 0 };

      function init() {
        updateScore();
        resetRound(HUMAN);
      }

      function resetRound(startingTurn) {
        board = Array(9).fill('');
        turn = startingTurn;
        roundOver = false;
        aiThinking = false;

        cells.forEach((cell) => {
          cell.textContent = '';
          cell.classList.remove('x', 'o', 'win');
        });

        if (turn === HUMAN) {
          setStatus('Your turn: <strong>X</strong>');
          setBoardEnabled(true);
        } else {
          setStatus('Computer is thinking…');
          setBoardEnabled(false);
          queueComputerMove();
        }
      }

      function setStatus(html) {
        statusEl.innerHTML = html;
      }

      function setBoardEnabled(enabled) {
        cells.forEach((cell, i) => {
          cell.disabled = !enabled || roundOver || !!board[i];
        });
      }

      function updateScore() {
        scoreYouEl.textContent = score.human;
        scoreAIEl.textContent = score.ai;
        scoreDrawEl.textContent = score.draw;
      }

      function makeMove(index, player) {
        board[index] = player;
        const cell = cells[index];
        cell.textContent = player;
        cell.classList.add(player.toLowerCase());

        const winLine = getWinLine(board, player);
        if (winLine) {
          roundOver = true;
          if (player === HUMAN) {
            score.human += 1;
            setStatus('You win! <strong>X</strong> takes the round');
          } else {
            score.ai += 1;
            setStatus('Computer wins! <strong>O</strong> takes the round');
          }
          updateScore();
          winLine.forEach((i) => cells[i].classList.add('win'));
          setBoardEnabled(false);
          return;
        }

        if (board.every(Boolean)) {
          roundOver = true;
          score.draw += 1;
          updateScore();
          setStatus('Draw! <strong>No winner</strong>');
          setBoardEnabled(false);
          return;
        }
      }

      function handleHumanMove(index) {
        if (roundOver || aiThinking || turn !== HUMAN || board[index]) return;

        makeMove(index, HUMAN);
        if (roundOver) return;

        turn = AI;
        setStatus('Computer is thinking…');
        setBoardEnabled(false);
        queueComputerMove();
      }

      function queueComputerMove() {
        aiThinking = true;
        setTimeout(() => {
          if (roundOver) return;
          const bestMove = getBestMove(board);
          makeMove(bestMove, AI);

          if (!roundOver) {
            turn = HUMAN;
            aiThinking = false;
            setStatus('Your turn: <strong>X</strong>');
            setBoardEnabled(true);
          }
        }, THINK_DELAY_MS);
      }

      function getWinLine(currentBoard, player) {
        return WIN_LINES.find((line) =>
          line.every((i) => currentBoard[i] === player),
        );
      }

      function getBestMove(currentBoard) {
        let bestScore = -Infinity;
        let bestMove = -1;

        for (let i = 0; i < currentBoard.length; i++) {
          if (currentBoard[i]) continue;
          currentBoard[i] = AI;
          const score = minimax(currentBoard, 0, false);
          currentBoard[i] = '';

          if (score > bestScore) {
            bestScore = score;
            bestMove = i;
          }
        }

        return bestMove;
      }

      function minimax(currentBoard, depth, isMaximizing) {
        if (getWinLine(currentBoard, AI)) return 10 - depth;
        if (getWinLine(currentBoard, HUMAN)) return depth - 10;
        if (currentBoard.every(Boolean)) return 0;

        if (isMaximizing) {
          let bestScore = -Infinity;
          for (let i = 0; i < currentBoard.length; i++) {
            if (currentBoard[i]) continue;
            currentBoard[i] = AI;
            bestScore = Math.max(
              bestScore,
              minimax(currentBoard, depth + 1, false),
            );
            currentBoard[i] = '';
          }
          return bestScore;
        }

        let bestScore = Infinity;
        for (let i = 0; i < currentBoard.length; i++) {
          if (currentBoard[i]) continue;
          currentBoard[i] = HUMAN;
          bestScore = Math.min(
            bestScore,
            minimax(currentBoard, depth + 1, true),
          );
          currentBoard[i] = '';
        }
        return bestScore;
      }

      cells.forEach((cell, i) => {
        cell.addEventListener('click', () => handleHumanMove(i));
      });

      function startNextRound() {
        humanStarts = !humanStarts;
        resetRound(humanStarts ? HUMAN : AI);
      }

      newRoundBtn.addEventListener('click', startNextRound);

      resetScoreBtn.addEventListener('click', () => {
        score = { human: 0, ai: 0, draw: 0 };
        updateScore();
        humanStarts = true;
        resetRound(HUMAN);
      });

      window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'r') startNextRound();
      });

      init();
    </script>
  </body>
</html>
