<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Conway's Game of Life</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #121a33;
        --panel-2: #1a2550;
        --text: #e7ecff;
        --muted: #9cb0e4;
        --accent: #60a5fa;
        --accent-2: #34d399;
        --danger: #f87171;
        --grid: rgba(152, 171, 225, 0.15);
        --alive: #7dd3fc;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(
          circle at 20% 0%,
          #1a2858 0%,
          var(--bg) 45%
        );
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      body {
        padding: 0.75rem;
      }

      .app {
        height: 100%;
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 0.75rem;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 1rem;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 2.5vw, 2rem);
        line-height: 1.2;
      }

      .subtitle {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .stats {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .pill {
        background: rgba(96, 165, 250, 0.14);
        border: 1px solid rgba(125, 211, 252, 0.28);
        border-radius: 999px;
        padding: 0.35rem 0.75rem;
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .controls {
        background: linear-gradient(
          180deg,
          rgba(46, 70, 140, 0.4),
          rgba(21, 30, 63, 0.55)
        );
        border: 1px solid rgba(157, 178, 241, 0.2);
        border-radius: 12px;
        padding: 0.75rem;
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 0.5rem;
      }

      .group {
        grid-column: span 12;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem;
      }

      @media (min-width: 760px) {
        .group.primary {
          grid-column: span 7;
        }

        .group.secondary {
          grid-column: span 5;
          justify-content: flex-end;
        }
      }

      button,
      select,
      input[type='range'] {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid rgba(159, 181, 247, 0.3);
        border-radius: 10px;
        padding: 0.48rem 0.72rem;
        font: inherit;
      }

      button {
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 120ms ease;
      }

      button:hover {
        background: #24356f;
      }

      button:active {
        transform: translateY(1px);
      }

      button.primary {
        background: linear-gradient(180deg, #3b82f6, #2563eb);
        border-color: rgba(147, 197, 253, 0.7);
      }

      button.warning {
        background: linear-gradient(180deg, #f97316, #ea580c);
        border-color: rgba(254, 215, 170, 0.65);
      }

      .speed-wrap,
      .brush-wrap,
      .preset-wrap {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .speed-wrap label,
      .brush-wrap label,
      .preset-wrap label {
        color: var(--muted);
        font-size: 0.92rem;
      }

      #speed {
        width: min(190px, 40vw);
        padding: 0;
      }

      .board-wrap {
        background: rgba(12, 18, 38, 0.75);
        border: 1px solid rgba(163, 184, 244, 0.22);
        border-radius: 12px;
        min-height: 280px;
        height: clamp(320px, 62vh, 780px);
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      canvas {
        display: block;
        border-radius: 10px;
        box-shadow: 0 0 0 1px rgba(99, 129, 217, 0.22) inset;
        background: #0a1024;
        touch-action: none;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.88rem;
        text-align: center;
      }

      kbd {
        border: 1px solid rgba(156, 163, 175, 0.55);
        border-bottom-width: 2px;
        border-radius: 6px;
        padding: 0.05rem 0.35rem;
        font-size: 0.8rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>Conway's Game of Life</h1>
          <p class="subtitle">
            Build patterns, tweak speed, and watch cellular life emerge.
          </p>
        </div>
        <div class="stats">
          <div class="pill">Generation: <strong id="generation">0</strong></div>
          <div class="pill">Live cells: <strong id="liveCount">0</strong></div>
        </div>
      </header>

      <section
        class="controls"
        aria-label="Simulation controls"
      >
        <div class="group primary">
          <button
            id="playPauseBtn"
            class="primary"
            type="button"
          >
            ▶ Play
          </button>
          <button
            id="stepBtn"
            type="button"
          >
            Step
          </button>
          <button
            id="randomBtn"
            type="button"
          >
            Randomize
          </button>
          <button
            id="clearBtn"
            class="warning"
            type="button"
          >
            Clear
          </button>

          <div class="speed-wrap">
            <label for="speed">Speed</label>
            <input
              id="speed"
              type="range"
              min="1"
              max="30"
              value="10"
            />
            <span id="speedValue">10 gen/s</span>
          </div>
        </div>

        <div class="group secondary">
          <div class="brush-wrap">
            <label for="brushMode">Brush</label>
            <select id="brushMode">
              <option value="draw">Draw</option>
              <option value="erase">Erase</option>
              <option value="toggle">Toggle</option>
            </select>
          </div>

          <div class="preset-wrap">
            <label for="preset">Pattern</label>
            <select id="preset"></select>
            <button
              id="insertPresetBtn"
              type="button"
            >
              Insert
            </button>
          </div>
        </div>
      </section>

      <section class="board-wrap">
        <canvas
          id="board"
          aria-label="Game of Life grid"
        ></canvas>
      </section>

      <p class="hint">
        Drag to draw. Right-click (or select erase brush) to erase.
        <kbd>Space</kbd> Play/Pause • <kbd>N</kbd> Step • <kbd>R</kbd> Randomize
        • <kbd>C</kbd> Clear
      </p>
    </main>

    <script>
      (() => {
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const boardWrap = document.querySelector('.board-wrap');

        const generationEl = document.getElementById('generation');
        const liveCountEl = document.getElementById('liveCount');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stepBtn = document.getElementById('stepBtn');
        const clearBtn = document.getElementById('clearBtn');
        const randomBtn = document.getElementById('randomBtn');
        const speedInput = document.getElementById('speed');
        const speedValueEl = document.getElementById('speedValue');
        const brushModeSelect = document.getElementById('brushMode');
        const presetSelect = document.getElementById('preset');
        const insertPresetBtn = document.getElementById('insertPresetBtn');

        const state = {
          cols: 0,
          rows: 0,
          cellSize: 14,
          grid: new Uint8Array(0),
          nextGrid: new Uint8Array(0),
          generation: 0,
          liveCount: 0,
          speed: 10,
          running: false,
          timer: null,
        };

        const patterns = {
          Glider: [
            [1, 0],
            [2, 1],
            [0, 2],
            [1, 2],
            [2, 2],
          ],
          Blinker: [
            [0, 0],
            [1, 0],
            [2, 0],
          ],
          Toad: [
            [1, 0],
            [2, 0],
            [3, 0],
            [0, 1],
            [1, 1],
            [2, 1],
          ],
          Beacon: [
            [0, 0],
            [1, 0],
            [0, 1],
            [1, 1],
            [2, 2],
            [3, 2],
            [2, 3],
            [3, 3],
          ],
          'Lightweight Spaceship': [
            [1, 0],
            [2, 0],
            [3, 0],
            [4, 0],
            [0, 1],
            [4, 1],
            [4, 2],
            [0, 3],
            [3, 3],
          ],
        };

        Object.keys(patterns).forEach((name) => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          presetSelect.appendChild(option);
        });

        function idx(x, y) {
          return y * state.cols + x;
        }

        function desiredCellSize() {
          const w = window.innerWidth;
          if (w < 430) return 10;
          if (w < 900) return 12;
          return 14;
        }

        function createOrResizeGrid() {
          const rect = boardWrap.getBoundingClientRect();
          const newCellSize = desiredCellSize();
          const newCols = Math.max(20, Math.floor(rect.width / newCellSize));
          const newRows = Math.max(20, Math.floor(rect.height / newCellSize));

          if (
            newCols === state.cols &&
            newRows === state.rows &&
            newCellSize === state.cellSize
          ) {
            fitCanvas();
            render();
            return;
          }

          const oldCols = state.cols;
          const oldRows = state.rows;
          const oldGrid = state.grid;

          state.cols = newCols;
          state.rows = newRows;
          state.cellSize = newCellSize;
          state.grid = new Uint8Array(newCols * newRows);
          state.nextGrid = new Uint8Array(newCols * newRows);

          if (oldGrid.length) {
            const xOffset = Math.floor((newCols - oldCols) / 2);
            const yOffset = Math.floor((newRows - oldRows) / 2);
            for (let y = 0; y < oldRows; y++) {
              for (let x = 0; x < oldCols; x++) {
                const nx = x + xOffset;
                const ny = y + yOffset;
                if (nx >= 0 && nx < newCols && ny >= 0 && ny < newRows) {
                  state.grid[idx(nx, ny)] = oldGrid[y * oldCols + x];
                }
              }
            }
          }

          fitCanvas();
          updateLiveCount();
          updateStats();
          render();
        }

        function fitCanvas() {
          const pixelWidth = state.cols * state.cellSize;
          const pixelHeight = state.rows * state.cellSize;
          const dpr = window.devicePixelRatio || 1;

          canvas.style.width = `${pixelWidth}px`;
          canvas.style.height = `${pixelHeight}px`;
          canvas.width = Math.floor(pixelWidth * dpr);
          canvas.height = Math.floor(pixelHeight * dpr);

          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.imageSmoothingEnabled = false;
        }

        function updateStats() {
          generationEl.textContent = state.generation.toString();
          liveCountEl.textContent = state.liveCount.toString();
        }

        function updateLiveCount() {
          let count = 0;
          for (let i = 0; i < state.grid.length; i++) count += state.grid[i];
          state.liveCount = count;
        }

        function clearGrid(resetGeneration = true) {
          state.grid.fill(0);
          state.nextGrid.fill(0);
          if (resetGeneration) state.generation = 0;
          state.liveCount = 0;
          updateStats();
          render();
        }

        function randomizeGrid(density = 0.24) {
          for (let i = 0; i < state.grid.length; i++) {
            state.grid[i] = Math.random() < density ? 1 : 0;
          }
          state.generation = 0;
          updateLiveCount();
          updateStats();
          render();
        }

        function stepSimulation() {
          const { cols, rows, grid, nextGrid } = state;

          for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
              let neighbors = 0;

              for (let oy = -1; oy <= 1; oy++) {
                for (let ox = -1; ox <= 1; ox++) {
                  if (ox === 0 && oy === 0) continue;
                  const nx = x + ox;
                  const ny = y + oy;
                  if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                    neighbors += grid[idx(nx, ny)];
                  }
                }
              }

              const i = idx(x, y);
              const alive = grid[i] === 1;
              nextGrid[i] = alive
                ? neighbors === 2 || neighbors === 3
                  ? 1
                  : 0
                : neighbors === 3
                  ? 1
                  : 0;
            }
          }

          state.grid = nextGrid;
          state.nextGrid = grid;
          state.generation++;

          updateLiveCount();
          updateStats();
          render();
        }

        function render() {
          const { cols, rows, cellSize, grid } = state;
          const width = cols * cellSize;
          const height = rows * cellSize;

          ctx.clearRect(0, 0, width, height);
          ctx.fillStyle = '#091025';
          ctx.fillRect(0, 0, width, height);

          ctx.fillStyle = getComputedStyle(document.documentElement)
            .getPropertyValue('--alive')
            .trim();
          for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
              if (grid[idx(x, y)]) {
                ctx.fillRect(
                  x * cellSize + 1,
                  y * cellSize + 1,
                  cellSize - 1,
                  cellSize - 1,
                );
              }
            }
          }

          if (cellSize >= 10) {
            ctx.strokeStyle = getComputedStyle(document.documentElement)
              .getPropertyValue('--grid')
              .trim();
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x <= cols; x++) {
              const px = x * cellSize + 0.5;
              ctx.moveTo(px, 0);
              ctx.lineTo(px, height);
            }
            for (let y = 0; y <= rows; y++) {
              const py = y * cellSize + 0.5;
              ctx.moveTo(0, py);
              ctx.lineTo(width, py);
            }
            ctx.stroke();
          }
        }

        function setRunning(nextRunning) {
          if (state.running === nextRunning) return;
          state.running = nextRunning;

          if (state.timer) {
            clearInterval(state.timer);
            state.timer = null;
          }

          if (state.running) {
            const interval = Math.max(16, 1000 / state.speed);
            state.timer = setInterval(stepSimulation, interval);
            playPauseBtn.textContent = '❚❚ Pause';
          } else {
            playPauseBtn.textContent = '▶ Play';
          }
        }

        function restartTimerIfRunning() {
          if (!state.running) return;
          setRunning(false);
          setRunning(true);
        }

        function placePattern(
          name,
          centerX = Math.floor(state.cols / 2),
          centerY = Math.floor(state.rows / 2),
        ) {
          const pattern = patterns[name];
          if (!pattern) return;

          let minX = Infinity;
          let minY = Infinity;
          let maxX = -Infinity;
          let maxY = -Infinity;

          for (const [x, y] of pattern) {
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }

          const patternWidth = maxX - minX + 1;
          const patternHeight = maxY - minY + 1;
          const startX = centerX - Math.floor(patternWidth / 2);
          const startY = centerY - Math.floor(patternHeight / 2);

          for (const [x, y] of pattern) {
            const gx = startX + (x - minX);
            const gy = startY + (y - minY);
            if (gx >= 0 && gx < state.cols && gy >= 0 && gy < state.rows) {
              state.grid[idx(gx, gy)] = 1;
            }
          }

          updateLiveCount();
          updateStats();
          render();
        }

        function pointerToCell(event) {
          const rect = canvas.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          const cellX = Math.floor(x / state.cellSize);
          const cellY = Math.floor(y / state.cellSize);
          return { cellX, cellY };
        }

        let isDrawing = false;
        let strokeVisited = new Set();

        function applyBrush(cellX, cellY, overrideMode = null) {
          if (
            cellX < 0 ||
            cellX >= state.cols ||
            cellY < 0 ||
            cellY >= state.rows
          )
            return;
          const i = idx(cellX, cellY);
          const mode = overrideMode || brushModeSelect.value;

          if (mode === 'toggle') {
            if (strokeVisited.has(i)) return;
            state.grid[i] = state.grid[i] ? 0 : 1;
            strokeVisited.add(i);
          } else if (mode === 'erase') {
            state.grid[i] = 0;
          } else {
            state.grid[i] = 1;
          }

          updateLiveCount();
          updateStats();
          render();
        }

        canvas.addEventListener('contextmenu', (event) =>
          event.preventDefault(),
        );

        canvas.addEventListener('pointerdown', (event) => {
          isDrawing = true;
          strokeVisited = new Set();
          canvas.setPointerCapture(event.pointerId);
          const { cellX, cellY } = pointerToCell(event);
          const forcedMode = event.button === 2 ? 'erase' : null;
          applyBrush(cellX, cellY, forcedMode);
        });

        canvas.addEventListener('pointermove', (event) => {
          if (!isDrawing) return;
          const { cellX, cellY } = pointerToCell(event);
          const forcedMode = event.buttons === 2 ? 'erase' : null;
          applyBrush(cellX, cellY, forcedMode);
        });

        function stopDrawing(event) {
          if (!isDrawing) return;
          isDrawing = false;
          strokeVisited.clear();
          if (event && canvas.hasPointerCapture(event.pointerId)) {
            canvas.releasePointerCapture(event.pointerId);
          }
        }

        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);
        canvas.addEventListener('pointerleave', (event) => {
          if (event.pointerType === 'mouse' && event.buttons === 0) {
            stopDrawing(event);
          }
        });

        playPauseBtn.addEventListener('click', () =>
          setRunning(!state.running),
        );
        stepBtn.addEventListener('click', () => stepSimulation());
        clearBtn.addEventListener('click', () => clearGrid(true));
        randomBtn.addEventListener('click', () => randomizeGrid());

        speedInput.addEventListener('input', () => {
          state.speed = Number(speedInput.value);
          speedValueEl.textContent = `${state.speed} gen/s`;
          restartTimerIfRunning();
        });

        insertPresetBtn.addEventListener('click', () => {
          placePattern(presetSelect.value);
        });

        window.addEventListener('keydown', (event) => {
          if (
            ['INPUT', 'SELECT', 'TEXTAREA'].includes(
              document.activeElement?.tagName,
            )
          )
            return;

          if (event.code === 'Space') {
            event.preventDefault();
            setRunning(!state.running);
          } else if (event.key.toLowerCase() === 'n') {
            stepSimulation();
          } else if (event.key.toLowerCase() === 'r') {
            randomizeGrid();
          } else if (event.key.toLowerCase() === 'c') {
            clearGrid(true);
          }
        });

        const resizeObserver = new ResizeObserver(() => createOrResizeGrid());
        resizeObserver.observe(boardWrap);
        window.addEventListener('orientationchange', () =>
          createOrResizeGrid(),
        );

        state.speed = Number(speedInput.value);
        speedValueEl.textContent = `${state.speed} gen/s`;

        createOrResizeGrid();
        placePattern('Glider');
        placePattern(
          'Blinker',
          Math.floor(state.cols / 2) + 8,
          Math.floor(state.rows / 2) - 4,
        );
      })();
    </script>
  </body>
</html>
